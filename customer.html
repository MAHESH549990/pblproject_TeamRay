<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aasapure Registration</title>
<link rel="stylesheet" href="customer.css">

</head>
<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <h1>ASHA PURE</h1>
        <p>Fresh Milk. Pure & Simple.</p>

        <h2>Welcome to AshaPure!</h2>
        <p>Create your account to enjoy fresh milk delivered to your doorstep.</p>

        <div class="features">
            <p>✔ Pure & Quality Milk</p>
            <p>✔ Trusted Local Farmers</p>
            <p>✔ On-Time Delivery</p>
        </div>
    </div>

    <!-- Right Side -->
    <div class="right">
        <h2>Create Your Account</h2>
        <h4 style="color:rgb(130, 95, 49)">Registration as a Customer</h4>
        <br/>
        <form onsubmit="saveData(event)">

    <div class="form-group">
        <input type="text" id="name" placeholder="Full Name" required>
    </div>

    <div class="form-group">
        <input type="text" id="mobile" placeholder="Mobile Number" required>
    </div>

    <div class="form-group">
        <input type="email" id="email" placeholder="Email Address" required>
    </div>

    <div class="form-group">
        <input type="password" id="password" placeholder="Create Password" required>
    </div>

    <div class="form-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
    </div>

    <div class="checkbox">
        <input type="checkbox" required> I agree to Terms & Conditions
    </div>

    <button type="submit" class="btn">Create Account</button>

</form>
    </div>

</div>
<script>
function saveData(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let mobile = document.getElementById("mobile").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match ❌");
        return;
    }

    localStorage.setItem("name", name);
    localStorage.setItem("mobile", mobile);
    localStorage.setItem("email", email);
    localStorage.setItem("password", password);

    alert("Registration Successful ✅");
    window.location.href = "customerportal.html";
}
</script>

</body>
</html>
