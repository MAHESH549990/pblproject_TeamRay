<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merchant Registration - Aasapure</title>
<link rel="stylesheet" href="merchant.css">
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">
        <h1>ASHA PURE</h1>
        <p>Partner With Us</p>

        <h2>Grow Your Dairy Business 🐄</h2>
        <p>Join Aasapure and sell your milk directly to customers.</p>

        <div class="features">
            <p>✔ Get More Orders</p>
            <p>✔ Direct Customer Connection</p>
            <p>✔ Weekly Payments</p>
        </div>
    </div>

    <!-- Right Side -->
    <div class="right">
        <h2>Merchant Registration</h2>
        <h4 style="color:rgb(130, 95, 49)">Register as a Farmer</h4>
        <br/>

        <form action="/merchentinventry/inventry2.html">

            <div class="form-group">
                <input type="text" placeholder="Owner Full Name" required>
            </div>

            <div class="form-group">
                <input type="text" placeholder="Farm Name" required>
            </div>


            <div class="form-group">
                <input type="text" placeholder="Mobile Number" required>
            </div>

            <div class="form-group">
                <input type="email" placeholder="Email Address" required>
            </div>


            <div class="form-group">
                <select required>
                    <option value="">Milk Type</option>
                    <option>Cow Milk</option>
                    <option>Buffalo Milk</option>
                    <option>Mixed Milk</option>
                </select>
            </div>

            <div class="form-group">
                <input type="number" placeholder="Price per Litre (₹)" required>
            </div>

            <div class="form-group">
                <label style="font-size:13px;">Upload ID Proof</label>
                <input type="file" required>
            </div>

            <div class="form-group">
                <input type="password" placeholder="Create Password" required>
            </div>

            <div class="form-group">
                <input type="password" placeholder="Confirm Password" required>
            </div>

            <div class="checkbox">
                <input type="checkbox"> I agree to Terms & Conditions
            </div>
             
            <button class="btn" value="submit">Register as Merchant</button>
            
            <div class="footer">
                Already registered? <a href="#">Login Here</a>
            </div>

        </form>
    </div>

</div>

</body>
</html>
